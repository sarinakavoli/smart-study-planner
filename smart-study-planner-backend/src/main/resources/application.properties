spring.application.name=smart-study-planner

# Generative AI (Gemini) — read from the GEMINI_API_KEY Replit Secret.
# Replit stores this encrypted and injects it as an environment variable into
# the server process only.  It is never sent to the browser.
# If the variable is not set the /api/generate endpoint returns 503.
gemini.api.key=${GEMINI_API_KEY:}

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE:studyplanner}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=validate


spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=8080
