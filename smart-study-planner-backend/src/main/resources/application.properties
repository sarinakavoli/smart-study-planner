spring.application.name=smart-study-planner

# Google Cloud Secret Manager
# The Gemini API key is stored in GCP Secret Manager under the name GEMINI_API_KEY.
# The backend fetches it at runtime using a Service Account — it is never read from
# an environment variable, never hardcoded, and never sent to the browser.
#
# GCP_PROJECT_ID  — set as a Replit Environment Variable (non-sensitive project identifier)
# GCP_SERVICE_ACCOUNT_JSON — set as a Replit Secret (the full JSON key file content)
gcp.project.id=${GCP_PROJECT_ID:}

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE:studyplanner}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=validate


spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=8080
