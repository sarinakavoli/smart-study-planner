spring.application.name=smart-study-planner

# ── Google Cloud / Secret Manager ────────────────────────────────────────────
# Required Replit Secret (set via the Replit "Secrets" tab):
#   GCP_SERVICE_ACCOUNT_JSON – the full JSON content of the service account key
#                              downloaded from GCP Console (IAM → Service Accounts).
#
# Required Replit Environment Variable:
#   GCP_PROJECT_ID           – your GCP project ID (e.g. dev-sarina)
#
# The Gemini API key itself lives ONLY in Google Secret Manager under the name
# "GEMINI_API_KEY".  It is fetched at runtime by SecretManagerService and is
# never stored in Replit Secrets, application.properties, or any response body.
gcp.project.id=${GCP_PROJECT_ID:}

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE:studyplanner}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=validate


spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=8080
