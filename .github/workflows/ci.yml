name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run all tests
        working-directory: smart-study-planner-backend
        run: mvn test --batch-mode

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: smart-study-planner-backend/target/surefire-reports/

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: smart-study-planner-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: smart-study-planner-frontend
        run: npm ci

      - name: Lint frontend
        working-directory: smart-study-planner-frontend
        run: npm run lint

      - name: Build frontend
        working-directory: smart-study-planner-frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: smart-study-planner-frontend/dist/
