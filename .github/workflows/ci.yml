name: CI

# Cache strategy
# ──────────────
# Every cache key is prefixed with the branch ref so that branches cannot
# overwrite each other's caches.  When an exact key is missing (e.g. on the
# first run of a new branch) restore-keys provide a progressive fallback:
#   1. Any prior run on the same branch (same inputs, older run) → fastest
#   2. The most recent cache from the main branch → good partial hit
#   3. Any cache entry for the tool-version prefix → partial hit from any branch
# This means new branches warm up quickly from main instead of starting cold,
# while exact-match hits still skip redundant work entirely.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      # Cache key is derived from the branch ref, Java version, the workflow
      # file, pom.xml, and every source/test file.  A cache hit means the exact
      # same inputs produced a passing test run previously, so re-running is
      # redundant.  Any change to those inputs produces a new key and tests run
      # fresh.  restore-keys let a new branch warm up from main's cache instead
      # of starting cold (see top-of-file cache strategy comment).
      - name: Restore cached test results
        id: cache-backend-tests
        uses: actions/cache@v4
        with:
          path: smart-study-planner-backend/target/surefire-reports
          key: backend-tests-${{ github.ref }}-java17-${{ hashFiles('.github/workflows/ci.yml', 'smart-study-planner-backend/pom.xml', 'smart-study-planner-backend/src/main/**', 'smart-study-planner-backend/src/test/**') }}
          restore-keys: |
            backend-tests-${{ github.ref }}-java17-
            backend-tests-refs/heads/main-java17-
            backend-tests-java17-

      # Docker is pre-installed on ubuntu-latest runners. Verify the daemon is
      # responsive before running Testcontainers tests so any misconfiguration
      # surfaces as a clear error rather than a silent test skip.
      - name: Verify Docker daemon is available
        run: docker info

      - name: Run all tests including integration
        if: steps.cache-backend-tests.outputs.cache-hit != 'true'
        working-directory: smart-study-planner-backend
        # Run the complete test suite (unit + integration).
        # Both -DexcludedGroups= and -Dgroups= are passed as explicit empty overrides
        # so that any inherited or system-property value cannot silently filter out the
        # integration group via either mechanism.
        # The Testcontainers-based PostgreSQLSchemaValidationTest (@Tag("integration"))
        # MUST always execute in CI — do NOT set -DexcludedGroups=integration or
        # -Dgroups=<non-integration-subset> here, as either would hide schema
        # regressions behind a green build.
        run: mvn test --batch-mode -DexcludedGroups= -Dgroups=

      # Confirm PostgreSQLSchemaValidationTest ran and passed. Testcontainers
      # silently aborts the test when Docker is unavailable, so the report file
      # would be missing or show a skipped/error status. Failing here makes that
      # visible rather than letting a skipped test look like a green build.
      - name: Confirm Testcontainers schema test ran
        if: steps.cache-backend-tests.outputs.cache-hit != 'true'
        run: |
          REPORT="smart-study-planner-backend/target/surefire-reports/com.sarina.studyplanner.PostgreSQLSchemaValidationTest.txt"
          if [ ! -f "$REPORT" ]; then
            echo "ERROR: surefire report for PostgreSQLSchemaValidationTest not found — the test may have been skipped or never executed."
            exit 1
          fi
          if grep -qE "^Tests run:.*Errors: [^0]|^Tests run:.*Failures: [^0]|^Tests run:.*Skipped: [^0]" "$REPORT"; then
            echo "ERROR: PostgreSQLSchemaValidationTest did not pass cleanly:"
            cat "$REPORT"
            exit 1
          fi
          echo "PostgreSQLSchemaValidationTest ran and passed against a real PostgreSQL container."
          grep "^Tests run:" "$REPORT"

      - name: Summarise test execution
        if: always()
        run: |
          if [ "${{ steps.cache-backend-tests.outputs.cache-hit }}" = "true" ]; then
            echo "## Backend Tests: skipped (cache hit)" >> $GITHUB_STEP_SUMMARY
            echo "All inputs matched a previous passing run. Test results were restored from cache." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Backend Tests: ran from scratch (cache miss)" >> $GITHUB_STEP_SUMMARY
            echo "No matching cache entry found. Tests were executed against a live PostgreSQL container." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: smart-study-planner-backend/target/surefire-reports/

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Branch-scoped npm cache with restore-key fallbacks so new branches
      # reuse main's cached packages instead of downloading everything fresh
      # (see top-of-file cache strategy comment).
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: frontend-npm-${{ github.ref }}-node20-${{ hashFiles('smart-study-planner-frontend/package-lock.json') }}
          restore-keys: |
            frontend-npm-${{ github.ref }}-node20-
            frontend-npm-refs/heads/main-node20-
            frontend-npm-node20-

      # Cache key is derived from the branch ref, Node version, the workflow
      # file, package-lock.json, and every frontend source/test file.  A cache
      # hit means the exact same inputs produced a passing run previously, so
      # lint, tests, and build can be safely skipped.  restore-keys let a new
      # branch warm up from main's cache instead of starting cold (see
      # top-of-file cache strategy comment).
      - name: Restore cached frontend test results
        id: cache-frontend-tests
        uses: actions/cache@v4
        with:
          path: smart-study-planner-frontend/.test-cache
          key: frontend-tests-${{ github.ref }}-node20-${{ hashFiles('.github/workflows/ci.yml', 'smart-study-planner-frontend/package-lock.json', 'smart-study-planner-frontend/src/**', 'smart-study-planner-frontend/scripts/**') }}
          restore-keys: |
            frontend-tests-${{ github.ref }}-node20-
            frontend-tests-refs/heads/main-node20-
            frontend-tests-node20-

      - name: Install frontend dependencies
        working-directory: smart-study-planner-frontend
        run: npm ci

      - name: Lint frontend
        if: steps.cache-frontend-tests.outputs.cache-hit != 'true'
        working-directory: smart-study-planner-frontend
        run: npm run lint

      - name: Run frontend tests
        id: frontend-tests
        if: steps.cache-frontend-tests.outputs.cache-hit != 'true'
        working-directory: smart-study-planner-frontend
        run: npm test -- --coverage

      - name: Write coverage summary
        if: always() && steps.cache-frontend-tests.outputs.cache-hit != 'true'
        working-directory: smart-study-planner-frontend
        run: |
          SUMMARY_FILE="coverage/coverage-summary.json"
          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "## Frontend Coverage: no report generated" >> $GITHUB_STEP_SUMMARY
          else
            node -e "
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('$SUMMARY_FILE', 'utf8'));
              const total = data.total;
              const pct = k => total[k].pct + '%';
              const lines = [
                '## Frontend Test Coverage',
                '',
                '| Metric | Coverage |',
                '| --- | --- |',
                \`| Statements | \${pct('statements')} |\`,
                \`| Branches   | \${pct('branches')}   |\`,
                \`| Functions  | \${pct('functions')}  |\`,
                \`| Lines      | \${pct('lines')}      |\`,
              ];
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');
            "
          fi

      - name: Upload coverage report
        if: always() && steps.cache-frontend-tests.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: smart-study-planner-frontend/coverage/
          retention-days: 7
          if-no-files-found: ignore

      - name: Build frontend
        if: steps.cache-frontend-tests.outputs.cache-hit != 'true'
        working-directory: smart-study-planner-frontend
        run: npm run build

      - name: Record successful test run
        if: steps.cache-frontend-tests.outputs.cache-hit != 'true'
        run: |
          mkdir -p smart-study-planner-frontend/.test-cache
          echo "passed" > smart-study-planner-frontend/.test-cache/result.txt

      - name: Summarise frontend execution
        if: always()
        run: |
          if [ "${{ steps.cache-frontend-tests.outputs.cache-hit }}" = "true" ]; then
            echo "## Frontend Check: skipped (cache hit)" >> $GITHUB_STEP_SUMMARY
            echo "All inputs matched a previous passing run. Lint, tests, and build were skipped." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Frontend Check: ran from scratch (cache miss)" >> $GITHUB_STEP_SUMMARY
            echo "No matching cache entry found. Lint, tests, and build were executed." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload frontend test report on failure
        if: steps.frontend-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: smart-study-planner-frontend/test-results/junit.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload frontend build artifact
        if: steps.cache-frontend-tests.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: smart-study-planner-frontend/dist/
          retention-days: 7

  seed-scripts-tests:
    # Runs both seed-script test files in a single job to eliminate duplicate
    # Node/npm setup overhead:
    #   - seed-scripts-cli.test.js   (dry-run flag tests)
    #   - seed-verify-exit-cli.test.js (exit-code / mock-mode tests)
    # A failure here blocks the deploy job from running, preventing
    # regressions from reaching main undetected.
    name: Seed Scripts Tests
    runs-on: ubuntu-latest

    steps:
      # Sparse checkout fetches only the files needed to compute the cache key:
      # the workflow file, package-lock.json, and the seed-script source and
      # test files.  This lets the cache lookup happen before a full checkout so
      # that checkout, install, and tests can all be skipped on a cache hit.
      - name: Sparse checkout for cache key computation
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/workflows/ci.yml
            smart-study-planner-frontend/package-lock.json
            smart-study-planner-frontend/scripts/seed-categories.mjs
            smart-study-planner-frontend/scripts/seed-tasks.mjs
            smart-study-planner-frontend/scripts/seed-organizations.mjs
            smart-study-planner-frontend/scripts/seed-scripts-cli.test.js
            smart-study-planner-frontend/scripts/seed-verify-exit-cli.test.js
          sparse-checkout-cone-mode: false

      # Cache key is derived from the branch ref, Node version, the workflow
      # file, package-lock.json, and the seed-script source and test files only.
      # A cache hit means the exact same inputs produced a passing run
      # previously, so full checkout, install, and tests can be safely skipped.
      # restore-keys let a new branch warm up from main's cache instead of
      # starting cold (see top-of-file cache strategy comment).
      - name: Restore cached seed scripts test results
        id: cache-seed-tests
        uses: actions/cache@v4
        with:
          path: smart-study-planner-frontend/.seed-test-cache
          key: seed-scripts-tests-${{ github.ref }}-node20-${{ hashFiles('.github/workflows/ci.yml', 'smart-study-planner-frontend/package-lock.json', 'smart-study-planner-frontend/scripts/seed-categories.mjs', 'smart-study-planner-frontend/scripts/seed-tasks.mjs', 'smart-study-planner-frontend/scripts/seed-organizations.mjs', 'smart-study-planner-frontend/scripts/seed-scripts-cli.test.js', 'smart-study-planner-frontend/scripts/seed-verify-exit-cli.test.js') }}
          restore-keys: |
            seed-scripts-tests-${{ github.ref }}-node20-
            seed-scripts-tests-refs/heads/main-node20-
            seed-scripts-tests-node20-

      # Full checkout is only needed when the cache misses.  The sparse checkout
      # above already satisfies the key computation; this step upgrades it to the
      # complete tree so install and tests can run against all project files.
      - name: Full checkout
        if: steps.cache-seed-tests.outputs.cache-hit != 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.cache-seed-tests.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        if: steps.cache-seed-tests.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: frontend-npm-${{ github.ref }}-node20-${{ hashFiles('smart-study-planner-frontend/package-lock.json') }}
          restore-keys: |
            frontend-npm-${{ github.ref }}-node20-
            frontend-npm-refs/heads/main-node20-
            frontend-npm-node20-

      - name: Install frontend dependencies
        if: steps.cache-seed-tests.outputs.cache-hit != 'true'
        working-directory: smart-study-planner-frontend
        run: npm ci

      # Run both seed-script test files in one step so no GCP credentials are
      # required (all tests use --dry-run or mock mode).
      - name: Run seed scripts tests
        id: seed-tests
        if: steps.cache-seed-tests.outputs.cache-hit != 'true'
        working-directory: smart-study-planner-frontend
        run: npx vitest run scripts/seed-scripts-cli.test.js scripts/seed-verify-exit-cli.test.js

      - name: Upload seed scripts test report on failure
        if: steps.seed-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: seed-scripts-test-report
          path: smart-study-planner-frontend/test-results/junit.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Record successful test run
        if: steps.cache-seed-tests.outputs.cache-hit != 'true'
        run: |
          mkdir -p smart-study-planner-frontend/.seed-test-cache
          echo "passed" > smart-study-planner-frontend/.seed-test-cache/result.txt

      - name: Summarise seed scripts test execution
        if: always()
        run: |
          if [ "${{ steps.cache-seed-tests.outputs.cache-hit }}" = "true" ]; then
            echo "## Seed Scripts Tests: skipped (cache hit)" >> $GITHUB_STEP_SUMMARY
            echo "All inputs matched a previous passing run. Seed script tests were skipped." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ job.status }}" = "success" ]; then
            echo "## Seed Scripts Tests: passed" >> $GITHUB_STEP_SUMMARY
            echo "All CLI and exit-code scenarios for seed-categories.mjs and seed-tasks.mjs passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Seed Scripts Tests: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "One or more seed-script assertions failed. Check the test output above for details." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Download the \`seed-scripts-test-report\` artifact from this run for the full JUnit XML report." >> $GITHUB_STEP_SUMMARY
          fi

  audit-helper-tests:
    # Runs the 40 unit tests for the ID-classification helpers
    # (classifyId / printList) in audit-id-helpers.mjs.  These tests must pass
    # on every PR so that regressions in the helper logic are caught before
    # merging.  A failure here blocks the deploy job just like the other test
    # jobs do.
    name: Audit Helper Tests
    runs-on: ubuntu-latest

    steps:
      # Sparse checkout fetches only the files needed to compute the cache key:
      # the workflow file, package-lock.json, and the audit-helper source and
      # test files.  This lets the cache lookup happen before a full checkout so
      # that checkout, install, and tests can all be skipped on a cache hit.
      - name: Sparse checkout for cache key computation
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/workflows/ci.yml
            smart-study-planner-frontend/package-lock.json
            smart-study-planner-frontend/scripts/audit-id-helpers.mjs
            smart-study-planner-frontend/scripts/audit-id-helpers.test.js
          sparse-checkout-cone-mode: false

      # Cache key is derived from the branch ref, Node version, the workflow
      # file, package-lock.json, and the audit-helper source and test files
      # only.  A cache hit means the exact same inputs produced a passing run
      # previously, so full checkout, install, and tests can be safely skipped.
      # restore-keys let a new branch warm up from main's cache instead of
      # starting cold (see top-of-file cache strategy comment).
      - name: Restore cached audit helper test results
        id: cache-audit-helper-tests
        uses: actions/cache@v4
        with:
          path: smart-study-planner-frontend/.audit-helper-test-cache
          key: audit-helper-tests-${{ github.ref }}-node20-${{ hashFiles('.github/workflows/ci.yml', 'smart-study-planner-frontend/package-lock.json', 'smart-study-planner-frontend/scripts/audit-id-helpers.mjs', 'smart-study-planner-frontend/scripts/audit-id-helpers.test.js') }}
          restore-keys: |
            audit-helper-tests-${{ github.ref }}-node20-
            audit-helper-tests-refs/heads/main-node20-
            audit-helper-tests-node20-

      # Full checkout is only needed when the cache misses.  The sparse checkout
      # above already satisfies the key computation; this step upgrades it to
      # the complete tree so install and tests can run against all project files.
      - name: Full checkout
        if: steps.cache-audit-helper-tests.outputs.cache-hit != 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.cache-audit-helper-tests.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        if: steps.cache-audit-helper-tests.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: frontend-npm-${{ github.ref }}-node20-${{ hashFiles('smart-study-planner-frontend/package-lock.json') }}
          restore-keys: |
            frontend-npm-${{ github.ref }}-node20-
            frontend-npm-refs/heads/main-node20-
            frontend-npm-node20-

      - name: Install frontend dependencies
        if: steps.cache-audit-helper-tests.outputs.cache-hit != 'true'
        working-directory: smart-study-planner-frontend
        run: npm ci

      - name: Run audit helper tests
        id: audit-helper-tests
        if: steps.cache-audit-helper-tests.outputs.cache-hit != 'true'
        working-directory: smart-study-planner-frontend
        run: npx vitest run scripts/audit-id-helpers.test.js

      - name: Upload audit helper test report on failure
        if: steps.audit-helper-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: audit-helper-test-report
          path: smart-study-planner-frontend/test-results/junit.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Record successful test run
        if: steps.cache-audit-helper-tests.outputs.cache-hit != 'true'
        run: |
          mkdir -p smart-study-planner-frontend/.audit-helper-test-cache
          echo "passed" > smart-study-planner-frontend/.audit-helper-test-cache/result.txt

      - name: Summarise audit helper test execution
        if: always()
        run: |
          if [ "${{ steps.cache-audit-helper-tests.outputs.cache-hit }}" = "true" ]; then
            echo "## Audit Helper Tests: skipped (cache hit)" >> $GITHUB_STEP_SUMMARY
            echo "All inputs matched a previous passing run. Audit helper tests were skipped." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ job.status }}" = "success" ]; then
            echo "## Audit Helper Tests: passed" >> $GITHUB_STEP_SUMMARY
            echo "All 40 unit tests for classifyId() and printList() in audit-id-helpers.mjs passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Audit Helper Tests: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "One or more audit-helper assertions failed. Check the test output above for details." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Download the \`audit-helper-test-report\` artifact from this run for the full JUnit XML report." >> $GITHUB_STEP_SUMMARY
          fi

  audit-readable-ids-tests:
    # Runs the tests for the audit-readable-ids.mjs pre-deploy guard script.
    # This script is the last line of defence before any deployment, so its
    # tests must pass on every PR.  A failure here blocks the deploy job just
    # like the other test jobs do.
    name: Audit Readable IDs Tests
    runs-on: ubuntu-latest

    steps:
      # Sparse checkout fetches only the files needed to compute the cache key:
      # the workflow file, package-lock.json, and the audit-readable-ids source
      # and test files.  This lets the cache lookup happen before a full
      # checkout so that checkout, install, and tests can all be skipped on a
      # cache hit.
      - name: Sparse checkout for cache key computation
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/workflows/ci.yml
            smart-study-planner-frontend/package-lock.json
            smart-study-planner-frontend/scripts/audit-readable-ids.mjs
            smart-study-planner-frontend/scripts/audit-readable-ids.test.js
          sparse-checkout-cone-mode: false

      # Cache key is derived from the branch ref, Node version, the workflow
      # file, package-lock.json, and the audit-readable-ids source and test
      # files only.  A cache hit means the exact same inputs produced a passing
      # run previously, so full checkout, install, and tests can be safely
      # skipped.  restore-keys let a new branch warm up from main's cache
      # instead of starting cold (see top-of-file cache strategy comment).
      - name: Restore cached audit readable IDs test results
        id: cache-audit-readable-ids-tests
        uses: actions/cache@v4
        with:
          path: smart-study-planner-frontend/.audit-readable-ids-test-cache
          key: audit-readable-ids-tests-${{ github.ref }}-node20-${{ hashFiles('.github/workflows/ci.yml', 'smart-study-planner-frontend/package-lock.json', 'smart-study-planner-frontend/scripts/audit-readable-ids.mjs', 'smart-study-planner-frontend/scripts/audit-readable-ids.test.js') }}
          restore-keys: |
            audit-readable-ids-tests-${{ github.ref }}-node20-
            audit-readable-ids-tests-refs/heads/main-node20-
            audit-readable-ids-tests-node20-

      # Full checkout is only needed when the cache misses.  The sparse
      # checkout above already satisfies the key computation; this step
      # upgrades it to the complete tree so install and tests can run against
      # all project files.
      - name: Full checkout
        if: steps.cache-audit-readable-ids-tests.outputs.cache-hit != 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.cache-audit-readable-ids-tests.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        if: steps.cache-audit-readable-ids-tests.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: frontend-npm-${{ github.ref }}-node20-${{ hashFiles('smart-study-planner-frontend/package-lock.json') }}
          restore-keys: |
            frontend-npm-${{ github.ref }}-node20-
            frontend-npm-refs/heads/main-node20-
            frontend-npm-node20-

      - name: Install frontend dependencies
        if: steps.cache-audit-readable-ids-tests.outputs.cache-hit != 'true'
        working-directory: smart-study-planner-frontend
        run: npm ci

      - name: Run audit readable IDs tests
        id: audit-readable-ids-tests
        if: steps.cache-audit-readable-ids-tests.outputs.cache-hit != 'true'
        working-directory: smart-study-planner-frontend
        run: npx vitest run scripts/audit-readable-ids.test.js

      - name: Upload audit readable IDs test report on failure
        if: steps.audit-readable-ids-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: audit-readable-ids-test-report
          path: smart-study-planner-frontend/test-results/junit.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Record successful test run
        if: steps.cache-audit-readable-ids-tests.outputs.cache-hit != 'true'
        run: |
          mkdir -p smart-study-planner-frontend/.audit-readable-ids-test-cache
          echo "passed" > smart-study-planner-frontend/.audit-readable-ids-test-cache/result.txt

      - name: Summarise audit readable IDs test execution
        if: always()
        run: |
          if [ "${{ steps.cache-audit-readable-ids-tests.outputs.cache-hit }}" = "true" ]; then
            echo "## Audit Readable IDs Tests: skipped (cache hit)" >> $GITHUB_STEP_SUMMARY
            echo "All inputs matched a previous passing run. Audit readable IDs tests were skipped." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ job.status }}" = "success" ]; then
            echo "## Audit Readable IDs Tests: passed" >> $GITHUB_STEP_SUMMARY
            echo "All tests for audit-readable-ids.mjs passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Audit Readable IDs Tests: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "One or more audit-readable-ids assertions failed. Check the test output above for details." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Download the \`audit-readable-ids-test-report\` artifact from this run for the full JUnit XML report." >> $GITHUB_STEP_SUMMARY
          fi

  deploy:
    # Builds the frontend and deploys Firestore security rules and indexes to
    # Firebase on every push to main.  The migration-audit job is a downstream
    # dependency of this job so the audit always fires against the live,
    # just-deployed state of Firestore.
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check, seed-scripts-tests, audit-helper-tests, audit-readable-ids-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Install frontend dependencies
        working-directory: smart-study-planner-frontend
        run: npm ci

      - name: Build frontend
        working-directory: smart-study-planner-frontend
        run: npm run build

      - name: Extract Firebase project ID
        id: project
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          PROJECT_ID=$(echo "$GCP_SERVICE_ACCOUNT_JSON" | \
            node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).project_id));")
          echo "id=$PROJECT_ID" >> $GITHUB_OUTPUT

      # Pre-deploy guard: run the migration audit before touching security rules.
      # If any legacy documents remain the audit exits 1 and this step fails,
      # stopping the workflow before firebase deploy runs.  This prevents the
      # new security rules (which require organizationId on every document) from
      # locking users out of unmigrated data.
      #
      # Note: The separate `migration-audit` job (downstream of the deploy job)
      # provides a post-deploy safety net — it catches rules deployed through
      # another path (e.g., Firebase Console) while legacy documents still exist.
      # This step is the pre-deploy hard block; the migration-audit job is the
      # post-deploy detector.
      - name: Security-rules deploy guard — audit for legacy documents
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "Security-rules deploy guard: checking for legacy Firestore documents …"
          echo "════════════════════════════════════════════════════════"
          if [ -z "$GCP_SERVICE_ACCOUNT_JSON" ]; then
            echo "ERROR: GCP_SERVICE_ACCOUNT_JSON secret is not set." >&2
            echo "Cannot verify migration state. Aborting deploy to prevent locking users out of unmigrated data." >&2
            echo "## Security-rules deploy guard: FAILED — credentials missing" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          if ! node smart-study-planner-frontend/scripts/audit-readable-ids.mjs; then
            echo "" >&2
            echo "════════════════════════════════════════════════════════" >&2
            echo "DEPLOY BLOCKED — legacy documents detected" >&2
            echo "════════════════════════════════════════════════════════" >&2
            echo "" >&2
            echo "One or more Firestore documents still use legacy auto-IDs." >&2
            echo "Deploying the security rules at this point would lock users" >&2
            echo "out of their data because the rules require organizationId" >&2
            echo "on every task and category document." >&2
            echo "" >&2
            echo "Run the migration first:" >&2
            echo "  node smart-study-planner-frontend/scripts/migrate-to-readable-ids.mjs" >&2
            echo "Then verify with:" >&2
            echo "  node smart-study-planner-frontend/scripts/audit-readable-ids.mjs" >&2
            echo "See smart-study-planner-frontend/scripts/RUNBOOK-security-rules-rollout.md for the full procedure." >&2
            echo "## Security-rules deploy guard: BLOCKED — legacy documents remain" >> $GITHUB_STEP_SUMMARY
            echo "Deploy was aborted. Run migrate-to-readable-ids.mjs and push again." >> $GITHUB_STEP_SUMMARY
            echo "See \`smart-study-planner-frontend/scripts/RUNBOOK-security-rules-rollout.md\` for the full remediation procedure." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "Audit passed — no legacy documents detected. Proceeding with Firestore rules deploy."
          echo "## Security-rules deploy guard: passed" >> $GITHUB_STEP_SUMMARY

      - name: Deploy Firestore rules and indexes
        working-directory: smart-study-planner-frontend
        run: npx --yes firebase-tools deploy --only firestore --project "${{ steps.project.outputs.id }}"

  migration-audit:
    # Runs only on pushes to main, immediately after the deploy job completes.
    # This ensures the audit fires against the just-deployed state of Firestore
    # rather than at an earlier point in the pipeline.
    name: Post-Deploy Migration Audit
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies (includes firebase-admin)
        working-directory: smart-study-planner-frontend
        run: npm ci

      # On the main branch the GCP credential should be present so the audit
      # can verify migration state.  If the secret is absent (e.g. a fork or
      # fresh environment with no credentials configured) we skip cleanly with
      # a visible warning rather than failing the whole pipeline.
      - name: Verify Firestore credentials are configured
        id: check-credentials
        run: |
          if [ -z "$GCP_SERVICE_ACCOUNT_JSON" ]; then
            echo "WARNING: GCP_SERVICE_ACCOUNT_JSON secret is not set." >&2
            echo "Skipping migration audit — no Firebase credentials are available in this environment." >&2
            echo "Configure the secret in repository Settings → Secrets to enable the post-deploy migration audit." >&2
            echo "## Migration Audit: skipped — credentials not configured" >> $GITHUB_STEP_SUMMARY
            echo "GCP_SERVICE_ACCOUNT_JSON is not set. Set the repository secret to enable Firestore auditing." >> $GITHUB_STEP_SUMMARY
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Run migration audit
        if: steps.check-credentials.outputs.skip != 'true'
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "Running post-deploy migration audit against Firestore (deploy job completed successfully)..."
          node smart-study-planner-frontend/scripts/audit-readable-ids.mjs

      - name: Summarise audit result
        if: always()
        run: |
          if [ "${{ steps.check-credentials.outputs.skip }}" = "true" ]; then
            : # Summary already written by the credential-check step; nothing to add.
          elif [ "${{ job.status }}" = "success" ]; then
            echo "## Migration Audit: passed" >> $GITHUB_STEP_SUMMARY
            echo "No legacy-ID documents were detected. The Firestore migration is complete." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Migration Audit: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "One or more documents still use legacy auto-IDs. Run migrate-to-readable-ids.mjs to complete the migration before merging." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify Slack on audit failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *Migration Audit Failed* on `${{ github.repository }}`",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Migration Audit Failed*\n\nOne or more Firestore documents still use legacy auto-IDs after the latest deploy to `main`. The security rules may lock users out of unmigrated data.\n\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View failed run>\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`> by ${{ github.actor }}\n\nRun `migrate-to-readable-ids.mjs` to complete the migration, then push again."
                  }
                }
              ]
            }
